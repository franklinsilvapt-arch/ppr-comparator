name: Update PPR data

on:
  schedule:
    - cron: "0 8 * * 1"   # segundas às 08:00 UTC
  workflow_dispatch:        # permite correr manualmente

permissions:
  contents: write            # necessário para git push no passo 'Commit updated data'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape CMVM universe
        # universe.py carrega data/raw/cmvm_ppr_list.json; data/raw/ está no
        # .gitignore logo não vem no checkout — tem de ser re-gerado a cada run.
        run: python -m scrapers.cmvm

      - name: Run pipeline
        run: python main.py

      - name: Commit updated data
        # Rebase+retry para lidar com race: se houver push para main durante
        # o run, `git push` falha com fetch-first. Tentamos 3x com pull --rebase.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/raw/*.csv || true
          git diff --staged --quiet && echo "Sem alteracoes em data/latest.json" && exit 0
          git commit -m "chore: weekly PPR data update [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "push tentativa $i falhou, retry em 5s..."
            sleep 5
          done
          echo "push falhou apos 3 tentativas" && exit 1

      # Opcional: deploy para Vercel em vez de GitHub Pages
      # - name: Deploy to Vercel
      #   run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
